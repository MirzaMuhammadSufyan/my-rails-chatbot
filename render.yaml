# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Dashboard → Blueprints → New Blueprint Instance → select this repo.
# Set RAILS_MASTER_KEY from config/master.key when prompted.

databases:
  - name: chatbot-db
    plan: free
    databaseName: chatbot
    user: chatbot

services:
  - type: web
    name: chatbot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "1"
      - key: SOLID_QUEUE_IN_PUMA
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: chatbot-db
          property: connectionString
